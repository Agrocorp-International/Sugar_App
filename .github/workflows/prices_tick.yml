name: Prices Tick

on:
  schedule:
    - cron: '0 0 * * *'     # 08:00 SGT — primary sett-1 pull
    - cron: '30 0 * * *'    # 08:30 SGT — safety net for GHA scheduling drift
  workflow_dispatch:

concurrency:
  group: prices-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /sugar/prices/tick
        run: |
          set -euo pipefail

          status=$(curl -sS \
            -o response.json \
            -w "%{http_code}" \
            -X POST \
            -H "X-Cron-Key: ${{ secrets.SNAPSHOT_CRON_KEY }}" \
            -m 180 \
            https://sugar-cotton-pnl-g9hsasb3bnfjbmat.southeastasia-01.azurewebsites.net/sugar/prices/tick)

          echo "HTTP status: $status"
          cat response.json

          test "$status" -ge 200
          test "$status" -lt 300
