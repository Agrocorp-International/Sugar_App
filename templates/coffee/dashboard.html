{% extends "base.html" %}
{% block title %}Coffee Dashboard{% endblock %}
{% block content %}
<div class="row g-4">
  <div class="col-md-8">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title mb-3">
          <span class="me-2">☕</span>Coffee Trading
        </h4>
        <p class="text-muted mb-4">
          ICE Coffee C (KC) — Arabica Coffee.
          Lot size: 37,500 lbs. Price unit: US cents/lb.
        </p>
        <div class="d-flex gap-2 align-items-center">
          <a href="{{ url_for('coffee_prices.index') }}" class="btn btn-primary">
            <i class="bi bi-currency-dollar me-1"></i>View Prices
          </a>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card">
      <div class="card-body">
        <h6 class="card-subtitle mb-2 text-muted">Status</h6>
        <div class="text-muted small">Coffee positions and PnL coming soon.</div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
